name: Generate Docs

on:
  # Manual trigger — specify a single file or directory to document
  workflow_dispatch:
    inputs:
      source_path:
        description: 'Path in source repo to document (e.g. src/core/hooks/buildings or src/core/hooks/buildings/buildings.ts)'
        required: true
      doc_type:
        description: 'Template to use'
        required: true
        type: choice
        options:
          - api
          - component
          - hook
          - context
          - concept
      output_path:
        description: 'Output path in docs repo (e.g. docs/hooks/buildings.md)'
        required: true

  # Auto trigger — runs when a PR is merged into main on the source repo
  # Requires a webhook or cross-repo dispatch (see README)
  repository_dispatch:
    types: [source-updated]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      # For manual dispatch: fetch the specified path
      - name: Fetch source file(s) from source repo
        if: github.event_name == 'workflow_dispatch'
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          SOURCE_ORG: ${{ secrets.SOURCE_REPO_ORG }}
          SOURCE_REPO: ${{ secrets.SOURCE_REPO_NAME }}
        run: |
          SOURCE_PATH="${{ github.event.inputs.source_path }}"

          echo "Fetching: $SOURCE_PATH from $SOURCE_ORG/$SOURCE_REPO"

          TREE_URL="https://api.github.com/repos/$SOURCE_ORG/$SOURCE_REPO/contents/$SOURCE_PATH"
          RESPONSE=$(curl -s -H "Authorization: token $SOURCE_TOKEN" "$TREE_URL")

          echo "GitHub API response preview: ${RESPONSE:0:200}"

          # If response starts with '[' it's a directory, '{' is a single file
          if echo "$RESPONSE" | grep -q '^\['; then
            echo "Detected: directory — fetching all .ts/.tsx files"
            echo "$RESPONSE" | \
              grep -o '"download_url":"[^"]*"' | \
              grep -E '\.(ts|tsx)"' | \
              sed 's/"download_url":"//;s/"//' | \
              while read url; do
                echo "Fetching file: $url"
                echo "// FILE: $url" >> /tmp/source_input.txt
                curl -s -H "Authorization: token $SOURCE_TOKEN" "$url" >> /tmp/source_input.txt
                echo "" >> /tmp/source_input.txt
              done
          else
            echo "Detected: single file"
            curl -s -H "Authorization: token $SOURCE_TOKEN" \
              "https://raw.githubusercontent.com/$SOURCE_ORG/$SOURCE_REPO/main/$SOURCE_PATH" \
              -o /tmp/source_input.txt
          fi

          echo "--- source_input.txt preview ---"
          head -20 /tmp/source_input.txt || echo "File is empty or missing"

      # For auto trigger: fetch changed files from the dispatch payload
      - name: Fetch changed source files
        if: github.event_name == 'repository_dispatch'
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          SOURCE_ORG: ${{ secrets.SOURCE_REPO_ORG }}
          SOURCE_REPO: ${{ secrets.SOURCE_REPO_NAME }}
        run: |
          CHANGED_FILES='${{ toJson(github.event.client_payload.changed_files) }}'
          echo "$CHANGED_FILES" | jq -r '.[]' | while read file; do
            echo "// FILE: $file" >> /tmp/source_input.txt
            curl -s -H "Authorization: token $SOURCE_TOKEN" \
              "https://raw.githubusercontent.com/$SOURCE_ORG/$SOURCE_REPO/main/$file" \
              >> /tmp/source_input.txt
            echo "" >> /tmp/source_input.txt
          done

      - name: Check for @docs-skip flag
        run: |
          if grep -q "@docs-skip" /tmp/source_input.txt; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "Source file is marked @docs-skip — skipping generation."
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Generate doc via Claude
        if: env.SKIP == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOC_TYPE="${{ github.event.inputs.doc_type || github.event.client_payload.doc_type }}"
          OUTPUT_PATH="${{ github.event.inputs.output_path || github.event.client_payload.output_path }}"

          node scripts/generate-doc.js \
            --source /tmp/source_input.txt \
            --template "docs/templates/${DOC_TYPE}-template.mdx" \
            --output "$OUTPUT_PATH"

      - name: Open draft PR
        if: env.SKIP == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'docs: [DRAFT] ${{ github.event.inputs.output_path || github.event.client_payload.output_path }}'
          body: |
            Auto-generated from `${{ github.event.inputs.source_path || github.event.client_payload.source_path }}`.

            **Before merging:**
            - [ ] Fill in all `<!-- TODO: ... -->` sections
            - [ ] Verify auto-populated props/params are accurate
            - [ ] Check all links in the Related section
            - [ ] Update `last_updated` date in frontmatter
            - [ ] Remove any placeholder comments that aren't needed
          draft: true
          branch: 'docs/auto-${{ github.run_id }}'
          commit-message: 'docs: auto-generate ${{ github.event.inputs.output_path || github.event.client_payload.output_path }}'